<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Exp V4: Immersive — Przewodnik Wędkarski PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #0A0A0A; color: #E8E4DF; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    /* ── MENU ── */
    .menu-overlay { position: fixed; inset: 0; z-index: 90; background: #0A0A0A; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 60px 36px; opacity: 0; pointer-events: none; transition: opacity .35s; }
    .menu-overlay.open { opacity: 1; pointer-events: all; }
    .menu-overlay nav { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .menu-overlay nav a { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 36px; color: #E8E4DF; text-decoration: none; padding: 12px 0; border-bottom: 1px solid rgba(232,228,223,0.08); }
    .menu-overlay nav a:last-child { border-bottom: none; }
    .menu-overlay nav a:active { color: #F57C20; }
    .menu-nav-label { font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: #5A6878; margin-bottom: 32px; }

    /* ── IMMERSIVE HERO (background-image based) ── */
    .hero {
      position: relative;
      width: 100%;
      height: 53svh;
      min-height: 280px;
      background-image: url('img/home.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      cursor: zoom-in;
    }
    /* Blur overlay via pseudo-element so we can animate opacity */
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url('img/home.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      filter: blur(10px);
      opacity: 0;
      transition: none;
      pointer-events: none;
      will-change: opacity;
    }
    .hero.blurred::after { opacity: var(--blur-opacity, 0); }

    .hero-gradient {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.25) 0%,
        transparent 30%,
        rgba(10,10,10,0.10) 70%,
        rgba(10,10,10,0.55) 100%
      );
    }

    /* ── TOPBAR ── */
    .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: calc(16px + env(safe-area-inset-top)) 20px 0; pointer-events: none; }
    .topbar > * { pointer-events: all; }
    .logo img { height: 30px; width: auto; display: block; }
    .hamburger { width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #E8E4DF; border-radius: 2px; transition: transform .3s, opacity .3s; transform-origin: center; }
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* ── SLIDING CARD ── */
    .card {
      position: relative;
      z-index: 10;
      background: #0A0A0A;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px calc(32px + env(safe-area-inset-bottom));
      will-change: transform;
    }
    .card-handle { width: 40px; height: 4px; background: rgba(232,228,223,0.2); border-radius: 2px; margin: 0 auto 24px; }

    .eyebrow { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 28px; color: #E8E4DF; line-height: 1.2; margin-bottom: 4px; }
    .sub-orange { font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; color: #F57C20; margin-bottom: 18px; }
    .big-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 48px; text-transform: uppercase; letter-spacing: 0.04em; color: #E8E4DF; line-height: 1.0; margin-bottom: 8px; }
    .sub2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; color: #F57C20; margin-bottom: 28px; }
    .divider { width: 48px; height: 2px; background: #F57C20; margin-bottom: 28px; }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
    .tag { font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(232,228,223,0.7); background: rgba(232,228,223,0.07); border: 1px solid rgba(232,228,223,0.13); padding: 7px 14px; border-radius: 100px; }

    .btn-cta { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 62px; background: #F57C20; color: #0A0A0A; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 17px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; border-radius: 12px; -webkit-tap-highlight-color: transparent; margin-bottom: 20px; }
    .btn-cta:active { opacity: .85; }
    .back-link { display: block; text-align: center; padding: 4px 0; font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(232,228,223,0.35); text-decoration: none; }

    /* ── LIGHTBOX ── */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.96); align-items: center; justify-content: center; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 100%; max-height: 100vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #E8E4DF; cursor: pointer; background: rgba(255,255,255,0.12); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="menu-overlay" id="menuOverlay">
    <p class="menu-nav-label">Nawigacja</p>
    <nav>
      <a href="exp-index.html">← Eksploracje</a>
      <a href="#">O nas</a>
      <a href="#">Galeria</a>
      <a href="#">Oferta</a>
      <a href="#">Kontakt</a>
    </nav>
  </div>

  <div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
    <div class="lightbox-close" onclick="closeLightbox()">✕</div>
    <img src="img/home.jpg" alt="Wędkarz o świcie">
  </div>

  <div class="hero" id="hero" onclick="openLightbox()">
    <div class="hero-gradient"></div>
    <div class="topbar" onclick="event.stopPropagation()">
      <div class="logo"><img src="img/logo.png" alt="Przewodnik Wędkarski PRO"></div>
      <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="card" id="card">
    <div class="card-handle"></div>
    <p class="eyebrow">Wyprawy z przewodnikiem</p>
    <p class="sub-orange">Rzeczne sumy</p>
    <h1 class="big-title">BELLY CAMP</h1>
    <p class="sub2">Cel — szczupak</p>
    <div class="divider"></div>
    <div class="tags">
      <span class="tag">Szczupak</span>
      <span class="tag">Sandacz</span>
      <span class="tag">Sum</span>
      <span class="tag">Czorsztyn</span>
      <span class="tag">Belly Camp</span>
    </div>
    <a href="#" class="btn-cta">Sprawdź ofertę</a>
    <a href="exp-index.html" class="back-link">← Wróć do eksploracji</a>
  </div>

  <script>
    function toggleMenu() {
      var o = document.getElementById('menuOverlay'), b = document.getElementById('hamburger');
      o.classList.toggle('open'); b.classList.toggle('active');
      document.body.style.overflow = o.classList.contains('open') ? 'hidden' : '';
    }
    document.querySelectorAll('.menu-overlay nav a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('menuOverlay').classList.remove('open');
        document.getElementById('hamburger').classList.remove('active');
        document.body.style.overflow = '';
      });
    });

    function openLightbox() {
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    var hero = document.getElementById('hero');
    var card = document.getElementById('card');
    var heroH = hero.offsetHeight;

    window.addEventListener('scroll', function() {
      var sy = window.scrollY;
      var h  = hero.offsetHeight;
      var s  = Math.max(0, Math.min(sy / h, 1));

      // Parallax: background-position shifts slower than scroll
      var posY = 30 - sy * 0.18; // start at 30%, drift upward slowly
      hero.style.backgroundPosition = 'center ' + posY.toFixed(2) + '%';

      // Blur via CSS variable on pseudo-element
      hero.classList.add('blurred');
      hero.style.setProperty('--blur-opacity', (s * 0.85).toFixed(3));

      // Card slides up as user scrolls
      var lift = Math.min(sy * 0.25, 60);
      card.style.transform = 'translateY(-' + lift.toFixed(1) + 'px)';
    }, { passive: true });
  </script>
</body>
</html>
