<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Preview — Przewodnik Wędkarski PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@0,700&family=Oswald:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; min-height: 100svh;
      background: #0A0A0A; color: #E8E4DF;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(48px + env(safe-area-inset-top)) 24px calc(48px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      min-height: 100svh;
    }

    .logo { margin-bottom: 48px; }
    .logo img { height: 28px; width: auto; opacity: 0.7; }

    .heading { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 26px; color: #E8E4DF; margin-bottom: 6px; }
    .sub { font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #5A6878; margin-bottom: 40px; }

    .cards { display: flex; flex-direction: column; gap: 14px; }

    .card {
      display: flex;
      align-items: center;
      text-decoration: none;
      background: #111;
      border: 1px solid rgba(232,228,223,0.08);
      border-left: 3px solid #F57C20;
      border-radius: 14px;
      padding: 24px 22px;
      gap: 18px;
      min-height: 80px;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { background: #1a1a1a; }

    .card-num {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #F57C20;
      min-width: 20px;
    }
    .card-title {
      flex: 1;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.04em;
      color: #E8E4DF;
    }
    .card-arrow { font-size: 20px; color: rgba(232,228,223,0.3); }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <img src="img/logo.png" alt="Przewodnik Wędkarski PRO">
    </div>

    <h1 class="heading">Przewodnik Wędkarski</h1>
    <p class="sub">Wybierz stronę</p>

    <div class="cards">
      <a href="exp-v4.html" class="card">
        <span class="card-num">01</span>
        <span class="card-title">Strona główna</span>
        <span class="card-arrow">→</span>
      </a>

      <a href="exp-v4-oferta.html" class="card">
        <span class="card-num">02</span>
        <span class="card-title">Oferta</span>
        <span class="card-arrow">→</span>
      </a>

      <a href="exp-v4-wojciech.html" class="card">
        <span class="card-num">03</span>
        <span class="card-title">Wojciech Krzyszczyk</span>
        <span class="card-arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
