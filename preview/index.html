<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przewodnik Wędkarski PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>

    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A;
      overflow: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0A0A0A;
      color: #E8E4DF;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PORTRAIT OVERLAY ───────────────────────────────── */
    .rotate-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .rotate-hint svg {
      width: 52px;
      height: 52px;
      fill: #F57C20;
      opacity: 0.75;
    }
    .rotate-hint p {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #E8E4DF;
      opacity: 0.65;
    }
    @media (orientation: portrait) and (max-width: 900px) {
      .rotate-hint { display: flex; }
    }

    /* ── MAIN WRAPPER ───────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0A0A0A;
    }

    /* ── HERO IMAGE ─────────────────────────────────────── */
    .hero-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 70%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 40% center;
      filter: brightness(0.78) saturate(1.1);
      display: block;
    }

    /* ── GRADIENT OVERLAY (osobny div, nie pseudo-element) ─ */
    .hero-overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 70%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      background:
        /* LEFT — najsilniejszy, wrasta głęboko w zdjęcie */
        linear-gradient(
          to right,
          #0A0A0A 0%,
          rgba(10,10,10,0.96) 10%,
          rgba(10,10,10,0.85) 20%,
          rgba(10,10,10,0.60) 34%,
          rgba(10,10,10,0.25) 52%,
          rgba(10,10,10,0.05) 70%,
          transparent 85%
        ),
        /* GÓRA */
        linear-gradient(
          to bottom,
          rgba(10,10,10,0.72) 0%,
          rgba(10,10,10,0.22) 14%,
          transparent 30%
        ),
        /* DÓŁ */
        linear-gradient(
          to top,
          rgba(10,10,10,0.85) 0%,
          rgba(10,10,10,0.30) 16%,
          transparent 32%
        ),
        /* PRAWA KRAWĘDŹ */
        linear-gradient(
          to left,
          rgba(10,10,10,0.50) 0%,
          rgba(10,10,10,0.12) 12%,
          transparent 28%
        );
    }

    /* Ciemna lewa strona (30%) — pełne tło aplikacji */
    /* Nie potrzeba osobnego elementu — body/html ma #0A0A0A */

    /* ── TOP BAR ────────────────────────────────────────── */
    .topbar {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(16px, 2.2vh, 28px) clamp(28px, 3.2vw, 52px) 0;
    }

    .logo img {
      height: clamp(26px, 3vh, 40px);
      width: auto;
      display: block;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: clamp(18px, 2.6vw, 38px);
    }

    /* Social icons */
    .social-icons {
      display: flex;
      align-items: center;
      gap: clamp(10px, 1.3vw, 18px);
    }
    .social-icons a {
      color: #ffffff;
      display: flex;
      align-items: center;
      text-decoration: none;
      opacity: 0.78;
      transition: color 0.2s, opacity 0.2s;
    }
    .social-icons a:hover {
      color: #F57C20;
      opacity: 1;
    }
    .social-icons svg {
      width: clamp(13px, 1.2vw, 18px);
      height: clamp(13px, 1.2vw, 18px);
      fill: currentColor;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      gap: clamp(14px, 1.8vw, 28px);
    }
    nav a {
      font-family: 'Oswald', sans-serif;
      font-weight: 400;
      font-size: clamp(9px, 0.82vw, 12px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #E8E4DF;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s, color 0.2s;
    }
    nav a:hover {
      opacity: 1;
      color: #F57C20;
    }

    /* ── MAIN (hasła) ───────────────────────────────────── */
    .main {
      position: relative;
      z-index: 10;
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: center;
      padding: 0 clamp(28px, 3.2vw, 52px);
      overflow: hidden;
    }

    .taglines {
      display: flex;
      flex-direction: column;
      max-width: 44%;
    }

    .tagline {
      display: block;
      line-height: 1;
    }

    /* ── 8 STYLÓW HASEŁ ─────────────────────────────────── */

    .t1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(21px, 2.85vw, 44px);
      color: #E8E4DF;
      letter-spacing: -0.015em;
      line-height: 1.08;
      padding-bottom: clamp(4px, 0.55vh, 8px);
    }

    .t2 {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: clamp(9px, 1.0vw, 14px);
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: #5A6878;
      padding-bottom: clamp(8px, 1.1vh, 16px);
    }

    .t3 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-style: italic;
      font-size: clamp(16px, 2.0vw, 30px);
      color: #F57C20;
      letter-spacing: 0.01em;
      line-height: 1.08;
      padding-bottom: clamp(3px, 0.4vh, 6px);
    }

    .t4 {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: clamp(10px, 1.2vw, 17px);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #E8E4DF;
      opacity: 0.42;
      padding-bottom: clamp(7px, 0.9vh, 13px);
    }

    .t5 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(18px, 2.3vw, 35px);
      color: #E8E4DF;
      letter-spacing: 0.015em;
      line-height: 1.08;
      padding-bottom: clamp(3px, 0.4vh, 6px);
    }

    .t6 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(30px, 4.5vw, 66px);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #E8E4DF;
      line-height: 0.92;
      padding-bottom: clamp(4px, 0.55vh, 9px);
    }

    .t7 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-style: italic;
      font-size: clamp(19px, 2.55vw, 38px);
      color: #F57C20;
      letter-spacing: -0.01em;
      line-height: 1.08;
      padding-bottom: clamp(4px, 0.5vh, 8px);
    }

    .t8 {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: clamp(8px, 0.85vw, 11px);
      text-transform: uppercase;
      letter-spacing: 0.38em;
      color: #5A6878;
      opacity: 0.65;
    }

    /* ── FOOTER ─────────────────────────────────────────── */
    .footer {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding: 0 clamp(28px, 3.2vw, 52px) clamp(14px, 1.8vh, 22px);
    }
    .footer p {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: clamp(8px, 0.68vw, 10px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5A6878;
      opacity: 0.38;
    }

  </style>
</head>
<body>

  <!-- Portrait hint -->
  <div class="rotate-hint" aria-hidden="true">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0l-.66.03 3.81 3.81 1.33-1.32zm-6.25-.77L6.42 7.57l-.89-.89A11.01 11.01 0 0 0 .55 11h1.5c.93-3.26 3.3-5.9 6.43-7.17V2.52L8.23 1.75zM12 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6zm-2-4.17L14.17 12 10 9.83v8.34z"/>
    </svg>
    <p>Obróć telefon poziomo</p>
  </div>

  <div id="app">

    <!-- Zdjęcie (prawe 70%) -->
    <div class="hero-bg">
      <img src="home-zdjecia/1.JPG" alt="Wędkarz na belly boat o świcie">
    </div>

    <!-- Gradienty wtapiające zdjęcie -->
    <div class="hero-overlay" aria-hidden="true"></div>

    <!-- HEADER -->
    <header class="topbar">
      <div class="logo">
        <img src="Loga/przewodnik wedkarski 350x100.PNG" alt="Przewodnik Wędkarski PRO">
      </div>
      <div class="topbar-right">

        <div class="social-icons">
          <!-- TikTok -->
          <a href="#" aria-label="TikTok">
            <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.16 8.16 0 0 0 4.78 1.52V6.78a4.85 4.85 0 0 1-1.01-.09z"/></svg>
          </a>
          <!-- Facebook -->

          </a>

          <a href="#" aria-label="YouTube">
            <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          </a>

          <a href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
          </a>
        </div>

        <nav>
          <a href="#">Start</a>
          <a href="#">O nas</a>
          <a href="#">Galeria</a>
          <a href="oferta.html">Oferta</a>
          <a href="#">Kontakt</a>
        </nav>

      </div>
    </header>

    <!-- HASŁA -->
    <main class="main">
      <div class="taglines">
        <span class="tagline t1">Wyprawy z przewodnikiem</span>
        <span class="tagline t2">Polowanie na sandacze</span>
        <span class="tagline t3">Rzeczne sumy</span>
        <span class="tagline t4">Szkolenia wędkarskie</span>
        <span class="tagline t5">Przygoda na Czorsztynie</span>
        <span class="tagline t6">Belly Camp</span>
        <span class="tagline t7">Cel&nbsp;&mdash; szczupak</span>
        <span class="tagline t8">Dzikie pstrągi</span>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p>&copy; 2025 Przewodnik W&#x0119;dkarski PRO &mdash; Wszelkie prawa zastrze&#x017C;one.</p>
    </footer>

  </div>
</body>
</html>
