<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wariant 2: Karta — Przewodnik Wędkarski PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #0A0A0A; color: #E8E4DF; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    /* ── MENU ─── */
    .menu-overlay { position: fixed; inset: 0; z-index: 90; background: #0A0A0A; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 60px 36px; opacity: 0; pointer-events: none; transition: opacity .35s; }
    .menu-overlay.open { opacity: 1; pointer-events: all; }
    .menu-overlay nav { display: flex; flex-direction: column; gap: 4px; width: 100%; }
    .menu-overlay nav a { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 36px; color: #E8E4DF; text-decoration: none; padding: 12px 0; border-bottom: 1px solid rgba(232,228,223,0.08); }
    .menu-overlay nav a:last-child { border-bottom: none; }
    .menu-overlay nav a:active { color: #F57C20; }
    .menu-label { font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: #5A6878; margin-bottom: 32px; }

    /* ── PHOTO 46% ─── */
    .photo-wrap { position: relative; width: 100%; height: 46svh; min-height: 240px; overflow: hidden; }
    .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: 55% 30%; filter: brightness(0.80) saturate(1.1); display: block; }
    /* gradient blending photo into dark card below */
    .photo-gradient {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(10,10,10,0.50) 0%, transparent 30%, rgba(13,13,13,0.70) 75%, #0d0d0d 100%);
      pointer-events: none;
    }

    /* ── TOPBAR ─── */
    .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 20; display: flex; align-items: center; justify-content: space-between; padding: 22px 22px 0; }
    .logo img { height: 32px; width: auto; display: block; }
    .hamburger { width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .hamburger span { display: block; width: 26px; height: 2px; background: #E8E4DF; border-radius: 2px; transition: transform .3s, opacity .3s; transform-origin: center; }
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* ── DARK CARD — seamless with photo ─── */
    .card {
      background: #0d0d0d;
      padding: 24px 24px 32px;
    }

    .card-label { font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: #5A6878; margin-bottom: 10px; display: block; }
    .card-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 30px; color: #E8E4DF; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 10px; }
    .card-sub { font-family: 'Playfair Display', serif; font-weight: 400; font-style: italic; font-size: 18px; color: #F57C20; margin-bottom: 28px; line-height: 1.3; }

    /* ── TAGS ─── */
    .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; }
    .tag { font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(232,228,223,0.75); background: rgba(232,228,223,0.08); border: 1px solid rgba(232,228,223,0.14); padding: 8px 16px; border-radius: 100px; }

    /* ── BUTTON ─── */
    .btn-cta { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 60px; background: #F57C20; color: #0A0A0A; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; border-radius: 10px; -webkit-tap-highlight-color: transparent; margin-bottom: 22px; }
    .btn-cta:active { opacity: .85; }

    .back-link { display: block; text-align: center; padding: 4px 0 8px; font-family: 'Oswald', sans-serif; font-weight: 300; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(232,228,223,0.35); text-decoration: none; }
  </style>
</head>
<body>

  <div class="menu-overlay" id="menuOverlay">
    <p class="menu-label">Nawigacja</p>
    <nav>
      <a href="mobile-wybor.html">Start</a>
      <a href="#">O nas</a>
      <a href="#">Galeria</a>
      <a href="mobile-v2-oferta.html">Oferta</a>
      <a href="#">Kontakt</a>
    </nav>
  </div>

  <div class="photo-wrap">
    <img src="img/home.jpg" alt="Wędkarz o świcie">
    <div class="photo-gradient"></div>
    <div class="topbar">
      <div class="logo"><img src="img/logo.png" alt="Przewodnik Wędkarski PRO"></div>
      <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="card">
    <span class="card-label">Wyprawy z przewodnikiem</span>
    <h1 class="card-title">Przewodnik<br>Wędkarski PRO</h1>
    <p class="card-sub">Rzeczne sumy &middot; Cel &mdash; szczupak</p>
    <div class="tags">
      <span class="tag">Szczupak</span>
      <span class="tag">Sandacz</span>
      <span class="tag">Belly Camp</span>
      <span class="tag">Czorsztyn</span>
      <span class="tag">Sum</span>
    </div>
    <a href="mobile-v2-oferta.html" class="btn-cta">Sprawdź ofertę</a>
    <a href="mobile-wybor.html" class="back-link">&#8592; Wróć do wyboru</a>
  </div>

  <script>
    function toggleMenu() {
      var o = document.getElementById('menuOverlay'), b = document.getElementById('hamburger');
      o.classList.toggle('open'); b.classList.toggle('active');
      document.body.style.overflow = o.classList.contains('open') ? 'hidden' : '';
    }
    document.querySelectorAll('.menu-overlay nav a').forEach(function(a) {
      a.addEventListener('click', function() {
        document.getElementById('menuOverlay').classList.remove('open');
        document.getElementById('hamburger').classList.remove('active');
        document.body.style.overflow = '';
      });
    });
  </script>
</body>
</html>
